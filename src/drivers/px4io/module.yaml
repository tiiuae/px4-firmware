module_name: I/O MAIN
actuator_output:
  show_subgroups_if: 'SYS_USE_IO>0'
  output_groups:
    - generator: pwm
      timer_config_file: src/drivers/px4io/timer_config_metadata.cpp
      param_prefix: PWM_MAIN
      channel_labels: ['MAIN', 'Capture']
      channel_label_module_name_prefix: false
      standard_params:
        disarmed: { min: 800, max: 2200, default: 1000 }
        min: { min: 800, max: 1400, default: 1000 }
        max: { min: 1600, max: 2200, default: 2000 }
        failsafe: { min: 800, max: 2200 }
      pwm_timer_param:
        description:
            short: Output Protocol Configuration for ${label}
            long: |
                Select which Output Protocol to use for outputs ${label}.

                Custom PWM rates can be used by directly setting any value >0.
        type: enum
        default: 400
        values:
            -1: OneShot
            50: PWM 50 Hz
            100: PWM 100 Hz
            200: PWM 200 Hz
            400: PWM 400 Hz
        reboot_required: true

parameters:
  - group: System
    definitions:
      SYS_USE_IO:
        description:
          short: Use I/O board
          long: |
            Set to 1 to use the PX4IO board for PWM output on MAIN.
            Set to 0 to disable PX4IO and use onboard PWM output instead.
        type: boolean
        reboot_required: true
        default: true
